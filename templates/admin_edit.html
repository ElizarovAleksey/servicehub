<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Редактирование сервиса</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}?v=3">
</head>

<body class="bg-bg text-text min-h-screen
             bg-gradient-to-br from-bg via-bg to-bg/90 py-12">

<div class="max-w-5xl mx-auto
            bg-card/80 backdrop-blur-md
            border border-border
            rounded-3xl
            shadow-[0_20px_60px_rgba(0,0,0,0.08)]
            dark:shadow-[0_20px_60px_rgba(0,0,0,0.4)]
            px-10 py-12
            space-y-10">

  <!-- HEADER -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold">
        ✏️ Редактирование сервиса
      </h1>
      <p class="text-sm text-muted">
        Изменение параметров сервиса
      </p>
    </div>

    <button id="toggleTheme"
      class="text-sm px-3 py-1.5 rounded-xl border border-border
             hover:bg-accent/10 transition">
      🌗 Тема
    </button>
  </div>

  <!-- ФОРМА -->
  <form method="post"  enctype="multipart/form-data"
        class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <input name="name"
           value="{{ service.name }}"
           class="bg-bg/70 border border-border
                  focus:outline-none
                  focus:ring-2 focus:ring-accent/40
                  focus:border-accent
                  p-3 rounded-xl transition"
           required>

    <select name="group_id"
            class="bg-bg/70 border border-border
                   focus:outline-none
                   focus:ring-2 focus:ring-accent/40
                   focus:border-accent
                   p-3 rounded-xl transition"
            required>
      {% for g in groups %}
        <option value="{{ g.id }}"
          {% if g.id == service.group_id %}selected{% endif %}>
          {{ g.name }}
        </option>
      {% endfor %}
    </select>

    <input name="url"
           value="{{ service.url }}"
           class="bg-bg/70 border border-border
                  focus:outline-none
                  focus:ring-2 focus:ring-accent/40
                  focus:border-accent
                  p-3 rounded-xl transition col-span-2"
           required>

    <label class="block text-sm">SSL проверка</label>

    <select name="ssl_mode"
    class="bg-bg/70 border border-border p-3 rounded-xl w-full">

      <option value="auto"
        {% if service.ssl_mode == "auto" %}selected{% endif %}>
        HTTPS auto
      </option>

      <option value="file"
        {% if service.ssl_mode == "file" %}selected{% endif %}>
        Certificate file
      </option>

      <option value="disabled"
        {% if service.ssl_mode == "disabled" %}selected{% endif %}>
        Disabled
      </option>

    </select>

    <textarea name="description"
              class="bg-bg/70 border border-border
                     focus:outline-none
                     focus:ring-2 focus:ring-accent/40
                     focus:border-accent
                     p-3 rounded-xl transition col-span-2">{{ service.description }}</textarea>

    <label class="bg-bg/70 border border-border
                    focus:outline-none
                    focus:ring-2 focus:ring-accent/40
                    focus:border-accent
                    p-3 rounded-xl transition col-span-2">
        <input type="checkbox"
              name="is_critical"
              value="1"
              {% if service.is_critical %}checked{% endif %}
              class="accent-red-500">
        Критичный сервис
      </label>   

    <input type="file"
           name="cert_file""
           class="bg-bg/70 border border-border
                  focus:outline-none
                  focus:ring-2 focus:ring-accent/40
                  focus:border-accent
                  p-3 rounded-xl transition col-span-2"
          >

    <div class="col-span-2 flex justify-between items-center">

      <a href="/admin"
         class="px-4 py-2 rounded-xl
                border border-border
                hover:bg-bg transition">
        ← Назад
      </a>

      <button
        class="bg-accent text-white
               px-6 py-2 rounded-xl
               hover:shadow-lg
               hover:shadow-accent/20
               transition">
        💾 Сохранить
      </button>

    </div>

  </form>

</div>

<script>
  const themeBtn = document.getElementById('toggleTheme');
  const html = document.documentElement;

  themeBtn.onclick = () => {
    html.classList.toggle('dark');
    localStorage.setItem('theme',
      html.classList.contains('dark') ? 'dark' : 'light');
  };

  if (localStorage.getItem('theme') === 'dark') {
    html.classList.add('dark');
  }
</script>
</body>
</html>
